<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RealClub · Modelo de Dados</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --rc-purple:#8E2E8E; --rc-red:#F03030; --rc-yellow:#F0C400; --rc-green:#00A848;
    --rc-blue:#4848A0; --rc-cyan:#3E8FB0;
    --rc-ink:#2E2E34; --rc-gray:#6B6B72; --rc-mute:#9A9AA2; --rc-line:#E8E8EE;
    --rc-bg:#F4F5F8; --rc-field:#F7F8FA;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:'Manrope',system-ui,sans-serif;background:var(--rc-bg);color:var(--rc-ink);-webkit-font-smoothing:antialiased;}
  #root{height:100%;}
  ::selection{background:#4848A022;}
  .app{display:flex;height:100vh;overflow:hidden;}

  .side{flex:0 0 250px;background:#fff;border-right:1px solid var(--rc-line);display:flex;flex-direction:column;padding:22px 16px;}
  .side-logo{height:30px;object-fit:contain;object-position:left;margin:6px 8px 26px;cursor:pointer;}
  .nav{display:flex;flex-direction:column;gap:3px;}
  .nav-h{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--rc-mute);margin:18px 10px 7px;}
  .nav-i{display:flex;align-items:center;gap:11px;height:40px;padding:0 12px;border-radius:10px;color:var(--rc-gray);
    font-size:13.5px;font-weight:600;cursor:pointer;transition:.14s;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
  .nav-i:hover{background:var(--rc-field);color:var(--rc-ink);}
  .nav-i.on{background:#4848A012;color:var(--rc-blue);}
  .nav-i.on svg{color:var(--rc-blue);}
  .nav-i svg{flex:0 0 auto;color:var(--rc-mute);}
  .side-user{margin-top:auto;display:flex;align-items:center;gap:11px;padding:11px;border-radius:12px;border:1px solid var(--rc-line);}
  .side-ava{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--rc-blue),var(--rc-purple));
    color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .side-uname{font-size:13px;font-weight:700;color:var(--rc-ink);line-height:1.2;}
  .side-urole{font-size:11.5px;color:var(--rc-mute);font-weight:600;}
  .side-out{margin-left:auto;background:none;border:none;color:var(--rc-mute);cursor:pointer;padding:6px;border-radius:8px;display:flex;}
  .side-out:hover{background:#F0303012;color:var(--rc-red);}

  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{flex:0 0 auto;height:74px;background:#fff;border-bottom:1px solid var(--rc-line);display:flex;align-items:center;gap:14px;padding:0 30px;}
  .top-title{font-size:18px;font-weight:800;letter-spacing:-.01em;}
  .top-sub{font-size:12.5px;color:var(--rc-mute);font-weight:600;margin-top:2px;}
  .btn{height:40px;padding:0 16px;border:1.5px solid var(--rc-line);background:#fff;border-radius:11px;font-family:inherit;
    font-size:13px;font-weight:700;color:var(--rc-ink);cursor:pointer;display:flex;align-items:center;gap:9px;transition:.15s;}
  .btn:hover{background:var(--rc-field);border-color:#D6D6DE;}
  .btn.primary{background:var(--rc-blue);border-color:var(--rc-blue);color:#fff;box-shadow:0 8px 18px -8px #4848A077;}
  .btn.primary:hover{filter:brightness(1.07);background:var(--rc-blue);}

  .scroll{flex:1;overflow-y:auto;padding:26px 30px 50px;}
  .scroll::-webkit-scrollbar{width:10px;}
  .scroll::-webkit-scrollbar-thumb{background:#D8D8E0;border-radius:99px;border:3px solid var(--rc-bg);}

  .legend{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:22px;font-size:12px;font-weight:700;color:var(--rc-gray);}
  .lg{display:flex;align-items:center;gap:7px;}
  .badge{display:inline-flex;align-items:center;height:18px;padding:0 7px;border-radius:5px;font-size:10px;font-weight:800;
    font-family:'JetBrains Mono',monospace;letter-spacing:.02em;}
  .badge.pk{background:#F0C40026;color:#9a7b00;}
  .badge.fk{background:#4848A018;color:var(--rc-blue);}
  .badge.uq{background:#8E2E8E16;color:var(--rc-purple);}
  .badge.nn{background:#6b6b7216;color:var(--rc-gray);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px;align-items:start;margin-bottom:26px;}
  .tbl{background:#fff;border:1px solid var(--rc-line);border-radius:16px;overflow:hidden;}
  .tbl-h{display:flex;align-items:center;gap:11px;padding:16px 18px;border-bottom:1px solid var(--rc-line);}
  .tbl-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto;}
  .tbl-name{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--rc-ink);}
  .tbl-desc{font-size:11.5px;color:var(--rc-mute);font-weight:600;margin-top:2px;}
  .col{display:flex;align-items:center;gap:10px;padding:9px 18px;border-bottom:1px solid #F1F1F5;}
  .col:last-child{border-bottom:none;}
  .col.key{background:#FCFBF6;}
  .col.fk{background:#FAFAFE;}
  .col-n{font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:600;color:var(--rc-ink);}
  .col-t{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--rc-mute);margin-left:auto;}
  .col-b{display:flex;gap:4px;}
  .fkref{font-size:10.5px;color:var(--rc-blue);font-weight:700;padding:1px 4px;}

  .rel-panel{background:#fff;border:1px solid var(--rc-line);border-radius:16px;padding:20px 24px;margin-bottom:24px;}
  .rel-t{font-size:15px;font-weight:800;margin:0 0 16px;}
  .rel{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #F1F1F5;font-size:13px;}
  .rel:last-child{border-bottom:none;}
  .rel code{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--rc-ink);background:var(--rc-field);padding:3px 8px;border-radius:6px;}
  .card-card{display:inline-flex;align-items:center;height:22px;padding:0 9px;border-radius:99px;background:#4848A012;color:var(--rc-blue);font-size:11px;font-weight:800;font-family:'JetBrains Mono',monospace;}
  .rel-desc{color:var(--rc-gray);font-weight:600;margin-left:auto;}

  .sqlbox{background:#23232b;border-radius:16px;overflow:hidden;border:1px solid #2f2f39;}
  .sqlbar{display:flex;align-items:center;gap:9px;padding:13px 18px;border-bottom:1px solid #34343f;}
  .sqlbar .t{color:#cfcfe0;font-size:12.5px;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .sqlbar .dot{width:11px;height:11px;border-radius:50%;}
  .sqlpre{margin:0;padding:18px 20px;max-height:340px;overflow:auto;color:#d7d7e6;font-family:'JetBrains Mono',monospace;
    font-size:12px;line-height:1.6;white-space:pre;}
  .sqlpre::-webkit-scrollbar{width:10px;height:10px;}
  .sqlpre::-webkit-scrollbar-thumb{background:#44444f;border-radius:99px;border:3px solid #23232b;}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--rc-ink);color:#fff;
    padding:11px 18px;border-radius:11px;font-size:13px;font-weight:700;opacity:0;transition:.25s;pointer-events:none;z-index:30;display:flex;align-items:center;gap:9px;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="sqlsrc">-- ============================================================
--  RealClub · Plataforma de Gestão para Clubes
--  Banco de dados do monitoramento do serviço "API Horse"
--  SGBD: PostgreSQL 14+
-- ============================================================

create extension if not exists "uuid-ossp";

-- ---------- Tipos enumerados ----------
create type papel_usuario     as enum ('suporte', 'admin', 'gestor');
create type status_servico    as enum ('ativo', 'parado');
create type ambiente_servico  as enum ('producao', 'homologacao');

-- ============================================================
--  usuarios — equipe que acessa o painel (tela de login)
-- ============================================================
create table usuarios (
  id            uuid           primary key default uuid_generate_v4(),
  nome          varchar(120)   not null,
  email         varchar(160)   not null unique,
  senha_hash    varchar(255)   not null,
  papel         papel_usuario  not null default 'suporte',
  ativo         boolean        not null default true,
  ultimo_login  timestamptz,
  criado_em     timestamptz    not null default now()
);

-- ============================================================
--  clubes — clubes cadastrados e monitorados
-- ============================================================
create table clubes (
  id                 uuid          primary key default uuid_generate_v4(),
  nome               varchar(160)  not null,
  cnpj               varchar(18)   unique,
  cidade             varchar(120),
  uf                 char(2),
  responsavel_nome   varchar(120),
  responsavel_email  varchar(160),
  criado_por         uuid          references usuarios(id) on delete set null,
  criado_em          timestamptz   not null default now(),
  atualizado_em      timestamptz   not null default now()
);

-- ============================================================
--  servicos_apihorse — configuração do serviço (1:1 com clube)
-- ============================================================
create table servicos_apihorse (
  id             uuid              primary key default uuid_generate_v4(),
  clube_id       uuid              not null unique references clubes(id) on delete cascade,
  url_health     varchar(300)      not null,
  versao         varchar(20),
  intervalo_min  smallint          not null default 5,
  ambiente       ambiente_servico  not null default 'producao',
  status_atual   status_servico    not null default 'ativo',
  verificado_em  timestamptz,
  criado_em      timestamptz       not null default now()
);

-- ============================================================
--  verificacoes — histórico de health-checks (cada consulta)
-- ============================================================
create table verificacoes (
  id                 bigserial       primary key,
  servico_id         uuid            not null references servicos_apihorse(id) on delete cascade,
  status             status_servico  not null,
  http_code          smallint,
  tempo_resposta_ms  integer,
  mensagem           text,
  verificado_em      timestamptz     not null default now()
);
create index idx_verif_servico_data on verificacoes (servico_id, verificado_em desc);

-- ============================================================
--  incidentes — períodos em que o serviço ficou parado
-- ============================================================
create table incidentes (
  id           bigserial    primary key,
  clube_id     uuid         not null references clubes(id) on delete cascade,
  servico_id   uuid         not null references servicos_apihorse(id) on delete cascade,
  causa        varchar(200),
  inicio       timestamptz  not null,
  fim          timestamptz,
  duracao_seg  integer,
  resolvido    boolean      not null default false,
  criado_em    timestamptz  not null default now()
);
create index idx_incid_clube_data on incidentes (clube_id, inicio desc);

-- ============================================================
--  alertas — notificações enviadas ao responsável do clube
-- ============================================================
create table alertas (
  id            bigserial     primary key,
  incidente_id  bigint        not null references incidentes(id) on delete cascade,
  canal         varchar(20)   not null default 'email',
  destinatario  varchar(160)  not null,
  enviado_em    timestamptz   not null default now()
);

-- ============================================================
--  Visão consolidada para o painel (status atual por clube)
-- ============================================================
create view vw_status_clubes as
select c.id              as clube_id,
       c.nome,
       c.cidade,
       c.uf,
       s.versao,
       s.status_atual,
       s.verificado_em
from clubes c
join servicos_apihorse s on s.clube_id = c.id;

</script>

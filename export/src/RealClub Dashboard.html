<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RealClub · Painel de Suporte</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<meta name="ext-resource-dependency" content="assets/realclub-logo.png" data-resource-id="logo" />
<style>
  :root{
    --rc-purple:#8E2E8E; --rc-red:#F03030; --rc-yellow:#F0C400; --rc-green:#00A848;
    --rc-blue:#4848A0; --rc-cyan:#3E8FB0;
    --rc-ink:#2E2E34; --rc-gray:#6B6B72; --rc-mute:#9A9AA2; --rc-line:#E8E8EE;
    --rc-bg:#F4F5F8; --rc-field:#F7F8FA;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:'Manrope',system-ui,sans-serif;background:var(--rc-bg);color:var(--rc-ink);-webkit-font-smoothing:antialiased;}
  #root{height:100%;}
  ::selection{background:#4848A022;}

  .app{display:flex;height:100vh;overflow:hidden;}

  /* ---------- sidebar ---------- */
  .side{flex:0 0 250px;background:#fff;border-right:1px solid var(--rc-line);display:flex;flex-direction:column;padding:22px 16px;}
  .side-logo{height:30px;object-fit:contain;object-position:left;margin:6px 8px 26px;}
  .nav{display:flex;flex-direction:column;gap:3px;}
  .nav-h{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--rc-mute);margin:18px 10px 7px;}
  .nav-i{display:flex;align-items:center;gap:11px;height:40px;padding:0 12px;border-radius:10px;color:var(--rc-gray);
    font-size:13.5px;font-weight:600;cursor:pointer;transition:.14s;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
  .nav-i:hover{background:var(--rc-field);color:var(--rc-ink);}
  .nav-i.on{background:#4848A012;color:var(--rc-blue);}
  .nav-i.on svg{color:var(--rc-blue);}
  .nav-i svg{flex:0 0 auto;color:var(--rc-mute);}
  .nav-badge{margin-left:auto;font-size:11px;font-weight:800;background:#F0303018;color:var(--rc-red);height:20px;min-width:20px;
    padding:0 6px;border-radius:99px;display:flex;align-items:center;justify-content:center;}
  .side-user{margin-top:auto;display:flex;align-items:center;gap:11px;padding:11px;border-radius:12px;border:1px solid var(--rc-line);}
  .side-ava{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--rc-blue),var(--rc-purple));
    color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .side-uname{font-size:13px;font-weight:700;color:var(--rc-ink);line-height:1.2;}
  .side-urole{font-size:11.5px;color:var(--rc-mute);font-weight:600;}
  .side-out{margin-left:auto;background:none;border:none;color:var(--rc-mute);cursor:pointer;padding:6px;border-radius:8px;display:flex;}
  .side-out:hover{background:#F0303012;color:var(--rc-red);}

  /* ---------- main ---------- */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{flex:0 0 auto;height:74px;background:#fff;border-bottom:1px solid var(--rc-line);
    display:flex;align-items:center;gap:18px;padding:0 30px;}
  .top-title{font-size:18px;font-weight:800;color:var(--rc-ink);letter-spacing:-.01em;}
  .top-sub{font-size:12.5px;color:var(--rc-mute);font-weight:600;margin-top:2px;}
  .search{margin-left:auto;position:relative;display:flex;align-items:center;}
  .search svg{position:absolute;left:13px;color:var(--rc-mute);}
  .search input{height:42px;width:280px;border:1.5px solid var(--rc-line);background:var(--rc-field);border-radius:11px;
    padding:0 14px 0 40px;font-family:inherit;font-size:13.5px;color:var(--rc-ink);font-weight:500;outline:none;transition:.15s;}
  .search input::placeholder{color:var(--rc-mute);font-weight:500;}
  .search input:focus{background:#fff;border-color:var(--rc-blue);box-shadow:0 0 0 3.5px #4848A018;}
  .icon-btn{width:42px;height:42px;border:1.5px solid var(--rc-line);background:#fff;border-radius:11px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;color:var(--rc-gray);transition:.15s;position:relative;}
  .icon-btn:hover{border-color:#D6D6DE;color:var(--rc-ink);background:var(--rc-field);}
  .icon-btn .ping{position:absolute;top:9px;right:10px;width:7px;height:7px;border-radius:50%;background:var(--rc-red);border:2px solid #fff;}

  .scroll{flex:1;overflow-y:auto;padding:28px 30px 40px;}

  /* ---------- stat row ---------- */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:26px;}
  .stat{background:#fff;border:1px solid var(--rc-line);border-radius:16px;padding:18px 20px;display:flex;align-items:center;gap:15px;}
  .stat-ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .stat-v{font-size:26px;font-weight:800;color:var(--rc-ink);line-height:1;letter-spacing:-.02em;}
  .stat-l{font-size:12.5px;color:var(--rc-gray);font-weight:600;margin-top:5px;}

  /* ---------- toolbar ---------- */
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .seg{display:inline-flex;background:#fff;border:1px solid var(--rc-line);border-radius:11px;padding:4px;gap:3px;}
  .seg button{height:32px;padding:0 14px;border:none;background:none;border-radius:8px;font-family:inherit;font-size:13px;
    font-weight:700;color:var(--rc-gray);cursor:pointer;transition:.14s;display:flex;align-items:center;gap:7px;}
  .seg button.on{background:var(--rc-ink);color:#fff;}
  .seg .cnt{font-size:11px;font-weight:800;opacity:.6;}
  .refresh{margin-left:auto;height:40px;padding:0 16px;border:1.5px solid var(--rc-line);background:#fff;border-radius:11px;
    font-family:inherit;font-size:13px;font-weight:700;color:var(--rc-ink);cursor:pointer;display:flex;align-items:center;gap:9px;transition:.15s;}
  .refresh:hover{background:var(--rc-field);border-color:#D6D6DE;}
  .refresh.spin svg{animation:rcspin .8s linear infinite;}
  @keyframes rcspin{to{transform:rotate(360deg);}}

  /* ---------- club cards ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
  .card{background:#fff;border:1px solid var(--rc-line);border-radius:18px;padding:20px;transition:box-shadow .2s,border-color .2s,transform .2s;}
  .card:hover{box-shadow:0 14px 32px -20px #2a2a3540;border-color:#DDDDE5;transform:translateY(-2px);}
  .card-top{display:flex;align-items:center;gap:13px;}
  .card-del{margin-left:auto;width:34px;height:34px;border-radius:9px;border:1px solid transparent;background:none;
    color:var(--rc-mute);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;transition:.15s;}
  .card-del:hover{background:#F0303012;color:var(--rc-red);border-color:#F0303022;}
  .confirm{display:flex;align-items:center;gap:8px;margin-left:auto;flex:0 0 auto;}
  .confirm span{font-size:12px;font-weight:700;color:var(--rc-gray);}
  .cf-btn{height:30px;padding:0 12px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--rc-line);background:#fff;color:var(--rc-gray);transition:.14s;}
  .cf-btn:hover{background:var(--rc-field);}
  .cf-btn.danger{background:var(--rc-red);border-color:var(--rc-red);color:#fff;}
  .cf-btn.danger:hover{filter:brightness(1.06);}
  .mono{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:16px;color:#fff;flex:0 0 auto;letter-spacing:-.02em;}
  .club-name{font-size:15.5px;font-weight:800;color:var(--rc-ink);letter-spacing:-.01em;line-height:1.25;}
  .club-meta{font-size:12px;color:var(--rc-mute);font-weight:600;margin-top:3px;display:flex;align-items:center;gap:6px;}
  .card-div{height:1px;background:var(--rc-line);margin:17px 0 15px;}
  .svc-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .svc-l{display:flex;align-items:center;gap:10px;}
  .svc-ic{width:32px;height:32px;border-radius:9px;background:var(--rc-field);display:flex;align-items:center;justify-content:center;color:var(--rc-gray);flex:0 0 auto;}
  .svc-name{font-size:13px;font-weight:700;color:var(--rc-ink);line-height:1.2;}
  .svc-sub{font-size:11px;color:var(--rc-mute);font-weight:600;margin-top:2px;}

  .status{display:inline-flex;align-items:center;gap:8px;height:32px;padding:0 13px 0 11px;border-radius:99px;
    font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:.15s;user-select:none;white-space:nowrap;}
  .status.up{background:#00A8481a;color:#067a39;}
  .status.up:hover{border-color:#00A84840;}
  .status.down{background:#F030301a;color:#c61f1f;}
  .status.down:hover{border-color:#F0303040;}
  .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;position:relative;}
  .status.up .dot{background:var(--rc-green);box-shadow:0 0 0 0 #00A84866;animation:pulse 1.8s infinite;}
  .status.down .dot{background:var(--rc-red);}
  @keyframes pulse{0%{box-shadow:0 0 0 0 #00A84866;}70%{box-shadow:0 0 0 7px #00A84800;}100%{box-shadow:0 0 0 0 #00A84800;}}

  /* ---------- environment switch ---------- */
  .envsw{display:inline-flex;align-items:center;gap:0;background:var(--rc-field);border:1px solid var(--rc-line);border-radius:11px;padding:3px;}
  .envsw button{height:34px;padding:0 14px;border:none;background:none;border-radius:8px;font-family:inherit;font-size:12.5px;
    font-weight:700;color:var(--rc-gray);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:8px;white-space:nowrap;}
  .envsw button:hover{color:var(--rc-ink);}
  .envsw button .led{width:8px;height:8px;border-radius:50%;background:#C8C8D0;transition:.15s;}
  .envsw button.on{background:#fff;color:var(--rc-ink);box-shadow:0 1px 3px #00000014;}
  .envsw button.on.qa{box-shadow:0 1px 3px #00000014, inset 0 0 0 1.5px #F0C40066;}
  .envsw button.on.prod{box-shadow:0 1px 3px #00000014, inset 0 0 0 1.5px #00A84855;}
  .envsw button.on.qa .led{background:var(--rc-yellow);}
  .envsw button.on.prod .led{background:var(--rc-green);box-shadow:0 0 0 3px #00A84826;}

  .env-pill{display:inline-flex;align-items:center;gap:7px;height:24px;padding:0 11px;border-radius:99px;font-size:11.5px;font-weight:800;letter-spacing:.01em;}
  .env-pill .led{width:7px;height:7px;border-radius:50%;}

  /* ---------- service meta in prod ---------- */
  .amb-tag{display:inline-flex;align-items:center;height:18px;padding:0 7px;border-radius:6px;font-size:10px;font-weight:800;
    text-transform:uppercase;letter-spacing:.04em;background:var(--rc-field);color:var(--rc-mute);border:1px solid var(--rc-line);}
  .url-line{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--rc-mute);font-weight:600;margin-top:11px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .url-line a{color:var(--rc-blue);text-decoration:none;}
  .url-line a:hover{text-decoration:underline;}
  .status.checking{background:var(--rc-field);color:var(--rc-gray);cursor:default;}
  .status.checking .dot{background:var(--rc-mute);animation:none;}
  .mini-spin{width:11px;height:11px;border:2px solid #C8C8D0;border-top-color:var(--rc-gray);border-radius:50%;animation:rcspin .7s linear infinite;}

  /* ---------- 3 checks chips ---------- */
  .checks{display:flex;gap:7px;margin-top:13px;flex-wrap:wrap;}
  .chk-chip{display:inline-flex;align-items:center;gap:6px;height:25px;padding:0 10px;border-radius:8px;font-size:11px;font-weight:700;
    background:var(--rc-field);color:var(--rc-gray);border:1px solid var(--rc-line);}
  .chk-chip .chk-led{width:7px;height:7px;border-radius:50%;background:#C8C8D0;flex:0 0 auto;}
  .chk-chip.ok{background:#00A8480e;border-color:#00A84833;color:#067a39;}
  .chk-chip.ok .chk-led{background:var(--rc-green);}
  .chk-chip.bad{background:#F030300e;border-color:#F0303033;color:#c01d1d;}
  .chk-chip.bad .chk-led{background:var(--rc-red);}
  .chk-chip.na{color:var(--rc-mute);}
  .chk-chip.na .chk-led{background:#D4D4DC;}
  .chk-chip.wait .chk-led{background:var(--rc-mute);animation:rcblink 1s ease infinite;}
  @keyframes rcblink{50%{opacity:.3;}}

  /* ---------- expand ---------- */
  .card-exp{display:flex;align-items:center;gap:7px;margin-top:12px;background:none;border:none;padding:4px 0;cursor:pointer;
    font-family:inherit;font-size:12px;font-weight:700;color:var(--rc-blue);}
  .card-exp:hover{color:#363680;}
  .card-exp .chev{display:flex;transition:.2s;}
  .card-exp .chev.up{transform:rotate(180deg);}

  .detail{margin-top:10px;background:var(--rc-field);border:1px solid var(--rc-line);border-radius:12px;padding:13px 14px;animation:rcfade .18s ease;}
  @keyframes rcfade{from{opacity:0;transform:translateY(-3px);}to{opacity:1;transform:none;}}
  .d-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:5px 0;}
  .d-row.dep{padding-left:12px;}
  .d-k{font-size:12px;font-weight:700;color:var(--rc-ink);display:flex;align-items:center;gap:7px;}
  .d-k svg{color:var(--rc-gray);}
  .d-ep{font-size:10px;font-weight:700;color:var(--rc-mute);background:#fff;border:1px solid var(--rc-line);padding:1px 6px;border-radius:5px;font-family:ui-monospace,Menlo,monospace;}
  .d-v{font-size:12px;font-weight:600;color:var(--rc-gray);text-align:right;}
  .d-v .na{color:var(--rc-mute);font-style:italic;}
  .d-sep{height:1px;background:var(--rc-line);margin:7px 0;}
  .d-note{font-size:11px;color:var(--rc-mute);font-weight:600;font-style:italic;margin-top:4px;padding-left:12px;}
  .dep-b{display:inline-flex;align-items:center;gap:5px;font-weight:700;}
  .dep-b svg{width:13px;height:13px;}
  .dep-b.ok{color:#067a39;}
  .dep-b.bad{color:#c01d1d;}

  /* ---------- empty / cta ---------- */
  .empty{text-align:center;padding:64px 20px;color:var(--rc-mute);font-weight:600;font-size:14px;}
  .empty-card{max-width:440px;margin:40px auto;background:#fff;border:1px solid var(--rc-line);border-radius:18px;padding:36px 34px;text-align:center;}
  .empty-ic{width:54px;height:54px;border-radius:15px;background:var(--rc-field);display:flex;align-items:center;justify-content:center;color:var(--rc-mute);margin:0 auto 16px;}
  .empty-h{font-size:16px;font-weight:800;color:var(--rc-ink);}
  .empty-p{font-size:13px;color:var(--rc-gray);font-weight:600;margin:8px 0 20px;line-height:1.55;}
  .empty-btn{height:44px;padding:0 22px;border:none;background:var(--rc-blue);color:#fff;border-radius:11px;font-family:inherit;
    font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:9px;box-shadow:0 8px 20px -8px #4848A077;}
  .empty-btn:hover{filter:brightness(1.07);}

  .scroll::-webkit-scrollbar{width:10px;}
  .scroll::-webkit-scrollbar-thumb{background:#D8D8E0;border-radius:99px;border:3px solid var(--rc-bg);}
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

</body>
</html>
